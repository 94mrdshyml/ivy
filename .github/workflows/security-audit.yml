name: Security Audit

on:
  pull_request:

jobs:
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run security audit
        id: audit
        run: pnpm audit --audit-level=high --json > audit-results.json || echo "AUDIT_FAILED=true" >> $GITHUB_ENV
        continue-on-error: true

      - name: Comment audit results on PR
        if: env.AUDIT_FAILED == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs')
            const results = JSON.parse(fs.readFileSync('audit-results.json', 'utf8'))
            const high = results.metadata?.vulnerabilities?.high ?? 0
            const critical = results.metadata?.vulnerabilities?.critical ?? 0
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `⚠️ Security audit found ${high} high and ${critical} critical vulnerabilities. Run \`pnpm audit\` locally for details. This does not block merge.`
            })
