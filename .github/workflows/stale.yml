name: Stale Issues and PRs

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:

jobs:
  stale:
    name: Mark Stale
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/stale@v9
        with:
          stale-issue-message: "This issue has been labeled as stale due to 14 days of inactivity."
          stale-pr-message: "This PR has been labeled as stale due to 14 days of inactivity."
          close-issue-message: "Closing due to inactivity. Reopen if still relevant."
          close-pr-message: "Closing due to inactivity. Reopen if still relevant."
          days-before-stale: 14
          days-before-close: 7
          stale-issue-label: "stale"
          stale-pr-label: "stale"
